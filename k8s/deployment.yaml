apiVersion: apps/v1
kind: Deployment

metadata:
  name: cloudnativeapp

spec:
  replicas: 2

  selector:
    matchLabels:
      app: cloudnativeapp

  template:
    metadata:
      labels:
        app: cloudnativeapp

    spec:
      containers:
        - name: cloudnativeapp
          image: shanmugapri/cloudnativeapp:v1
          ports:
            - containerPort: 8080